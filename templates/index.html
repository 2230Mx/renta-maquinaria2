<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renta de Maquinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🏗️ Renta de Maquinaria Pesada</span>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Catálogo de Equipos</h2>
        
        <div class="row">
            {% for maquina in maquinas %}
            <div class="col-md-4 mb-3">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ maquina.nombre }}</h5>
                        <h6 class="card-subtitle mb-2 text-muted">Marca: {{ maquina.marca }}</h6>
                        <p class="card-text fs-4"><strong>${{ maquina.precio_dia }}</strong> <small class="fs-6">/ día</small></p>
                        
                        {% if maquina.estado == 'disponible' %}
                            <span class="badge bg-success">Disponible</span>
                        {% else %}
                            <span class="badge bg-danger">Rentado</span>
                        {% endif %}
                        
                    </div>
                    <div class="card-footer bg-transparent border-top-0">
                        <button class="btn btn-outline-dark w-100">Solicitar Renta</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
